# ====================
# Site settings
# ====================
title: El Parque de la Bellota
subtitle: by Bellotita
description: Este espacio une todos los recursos interactivos, mapas y actividades del <strong>Parque de la Bellota</strong>. Un lugar para aprender y divertirse.
author:
baseurl: "" # the subpath of your site, e.g. /blog
url: # the base hostname & protocol for your site

# ====================
# Contact information
# ====================
email: administracion@encinardelalberche.es
phone: 91 867 40 03
street_address: Calle Pinos 160, Fase 1
city: Villa del Prado
state: Madrid
zip_code: 28630
country: España

# ====================
# Navigation & Tiles
# ====================
# Homepage tiles
tiles-source: pages # accepts "posts" or "pages"
tiles-count: 10

# Orden de navegación — slugs de _pages/ en el orden deseado
navigation:
  - discover
  - map
  - wildlife
  - activities
  - resources
  - routes
  - news

# ====================
# Social media
# ====================
# Key must match name of font awesome icon
# See https://fontawesome.com/icons?d=gallery&p=2&s=brands
# Icons are not shown if value is empty
# You need to restart jekyll for changes to have an effect
socials-display: false
socials:
  GitHub:
  GitLab:
  Google-Plus:
  Instagram:
  LinkedIn: 
  Twitter: 
  Facebook:
  Slack:

# ====================
# Jekyll configuration
# ====================
# Build settings
markdown: kramdown

sass:
  style: compressed

# Collections
collections:
  pages:
    output: true
    permalink: /:name
  news:
    output: true
    permalink: /:year/:month/:day/:title

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: news
    values:
      layout: post

# Exclude from build
exclude:
- "*.gemspec"
- LICENSE.md
- CONTRIBUTING.md
- README.md
